# Mortgage QA Memory Policy
# Version: mqm-policy-1
# Owner: platform-team@yourcompany.com
# Review cadence: annual (LL-2026-04 alignment)
# Last updated: 2026-07-14
#
# POC NOTE: allowed_prefixes below are pilot placeholders. Replace with your
# real staging/UAT hostnames before wiring Playwright MCP. deny_prod stays true.

version: mqm-policy-1

metadata:
  name: Mortgage QA Memory Policy
  description: >
    Governs what QA memory MCP may store, for how long, and who may write.
    Enforced pre-save on every write path (reporter pipeline + MCP tools).
  effective_date: 2026-07-14
  owner_team: platform-engineering
  approvers:
    - role: qa_lead
    - role: security
    - role: compliance

# ─── URL / environment boundaries ───────────────────────────────────────────

urls:
  allowed_prefixes:
    - https://staging.pilot-mortgage.example
    - https://uat.pilot-mortgage.example
  deny_prod: true
  deny_patterns:
    - 'https://.*\.prod\.'

environments:
  allowed:
    - local
    - ci
    - staging
    - uat
  production_agent_access: false

# ─── Retention (addresses long-term storage concern) ────────────────────────

retention:
  tier0_session_hours: 8
  tier1_operational_days: 30
  audit_metadata_days: 365
  audit_evidence_days: 90
  tier2_curated: until_superseded

  auto_purge:
    enabled: true
    schedule: "0 2 * * *"  # daily 02:00 UTC
    hard_delete: true

  on_session_end:
    delete:
      - session_notes
      - draft_locators
      - cached_snapshots
    summarize_to_tier1:
      - failure_signature
      - error_class
      - pass_fail_status

# ─── Storage backends ───────────────────────────────────────────────────────

storage:
  tier0_session: redis://localhost:6379/0
  tier1_operational: ./data/qa-memory.db
  tier2_curated: ./journeys/
  audit_metadata: ./data/qa-memory.db   # POC: same SQLite file; Postgres in prod
  audit_evidence: azure://your-storage-account/playwright-traces

# ─── Deny lists (never persist) ─────────────────────────────────────────────

deny_fields:
  - raw_snapshot
  - raw_prompt
  - raw_llm_response
  - network_body
  - screenshot_bytes
  - stack_trace
  - full_error_message

deny_patterns:
  - '\b\d{3}-\d{2}-\d{4}\b'           # SSN with dashes
  - '\b\d{9}\b'                        # bare SSN
  - '\b\d{16}\b'                       # card-like
  - '(?i)(password|secret|api_key|token|bearer)\s*[:=]'
  - '(?i)(ssn|social.security|taxpayer.ident)'

# ─── Synthetic loan scenarios (allowlist) ───────────────────────────────────

loan_scenarios:
  allowed_ids:
    - synthetic-retail-01
    - synthetic-refi-01
    - synthetic-heloc-01
  deny_production_loan_ids: true

# ─── Write permissions by tier ──────────────────────────────────────────────

write_permissions:
  tier0_automatic:
    - remember_session_note

  tier1_automatic:
    - record_run_summary
    - tag_failure_signature
    - remember_env_fact
    # Governed knowledge-graph writes (server-memory-compatible surface).
    - create_entities
    - add_observations
    - create_relations
    - delete_entities
    - delete_observations
    - delete_relations

  tier1_denied:
    - remember_raw_snapshot
    - remember_network_body
    - remember_prompt

  tier2_approval_required:
    - upsert_locator
    - propose_checkpoint

  tier2_workflow: git_pr_approval  # opens PR; no direct write

# ─── Role-based access ──────────────────────────────────────────────────────

roles:
  qa_engineer:
    read: all_read_tools
    write: tier0_automatic + tier1_automatic
  qa_lead:
    read: all_read_tools
    write: tier0_automatic + tier1_automatic + tier2_approval
  engineer:
    read: all_read_tools
    write: tier0_automatic
  qc_analyst:
    read: all_read_tools + get_audit_trail + export_qc_sample
    write: []
  platform:
    read: all
    write: all
    policy_edit: true

# ─── Playwright MCP restrictions ──────────────────────────────────────────────

playwright:
  package: "@playwright/mcp@latest"
  disable_run_code_unsafe: true
  default_mode: isolated
  default_headless: true
  allowed_browsers:
    - chromium
  require_audit_per_tool: true

# ─── Reporter allowlist (Tier 1 fields) ─────────────────────────────────────

reporter:
  allowed_columns:
    - test_id
    - journey_id
    - app_id
    - status
    - duration_ms
    - browser
    - os
    - env
    - commit_sha
    - loan_scenario_id
    - error_class
    - failure_signature
    - created_at
    - expires_at
  drop_run_on_pii_detected: true   # prefer drop over redact for CI errors

# ─── Knowledge-graph limits (governed memory service) ───────────────────────
# Guards against dumping raw snapshots / prompts / long payloads as
# "observations". PII/credential content is separately blocked by deny_patterns.

graph:
  max_observation_chars: 2000       # a single observation may not exceed this
  max_observations_per_entity: 200  # per create_entities / add_observations call

# ─── Audit ──────────────────────────────────────────────────────────────────

audit:
  log_reads: true
  log_writes: true
  log_policy_blocks: true
  hash_chain: true
  store_args_summary_only: true
  prompt_storage: template_id_only

# ─── Policy statement (external) ───────────────────────────────────────────

public_statement: >
  Mortgage QA Memory stores test intelligence, not loan data.
  Long-term retention is limited to human-approved journey definitions
  and aggregated flake metrics (30 days). Session data expires in 8 hours.
  Evidence blobs expire in 90 days. Raw snapshots, prompts, network bodies,
  and borrower-identifiable fields are blocked at write time.
